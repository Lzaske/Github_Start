<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polar Night Mountain Lake</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(48, 78, 118, 0.35), transparent 42%),
          linear-gradient(180deg, #030814, #050b16 48%, #02050d);
        font-family: Arial, Helvetica, sans-serif;
      }

      .frame {
        padding: 24px;
      }

      img {
        display: block;
        width: min(440px, 92vw);
        height: auto;
        border-radius: 10px;
        box-shadow: 0 28px 100px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <img src="./polar-night-mountain-lake.svg" alt="Polar night mountain lake poster" />
    </div>
  </body>
</html>
